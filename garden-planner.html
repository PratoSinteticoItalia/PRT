<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f4d32" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="PSI Ops" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <title>Garden Planner</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #fafaf6;
      }

      body {
        min-height: 100vh;
      }

      #garden-print-sheet {
        display: none;
      }

      @media print {
        @page {
          size: A4 portrait;
          margin: 8mm;
        }

        html, body {
          background: #ffffff;
          margin: 0;
          padding: 0;
        }

        body {
          print-color-adjust: exact;
          -webkit-print-color-adjust: exact;
        }

        body.garden-print-report #app {
          display: none !important;
        }

        body.garden-print-report #garden-print-sheet {
          display: block !important;
          width: 100% !important;
          max-width: 194mm;
          padding: 0 !important;
          margin: 0 !important;
          background: #fff !important;
        }

        body.garden-print-report #garden-print-sheet .print-sheet-root {
          width: 100%;
          margin: 0 auto;
          box-sizing: border-box;
        }

        body.garden-print-report #garden-print-sheet .print-no-break {
          break-inside: avoid-page;
          page-break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="garden-print-sheet" aria-hidden="true"></div>
    <noscript>Abilita JavaScript per usare il Garden Planner.</noscript>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react" src="./garden-planner-page.js?v=20260426-planner-generator-bridge-68"></script>
    <script>
      if ("serviceWorker" in navigator) {
        let reloaded = false;
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js?v=20260426-planner-generator-bridge-68").then((registration) => {
            if (registration.waiting) {
              registration.waiting.postMessage({ type: "SKIP_WAITING" });
            }
            registration.addEventListener("updatefound", () => {
              const worker = registration.installing;
              if (!worker) return;
              worker.addEventListener("statechange", () => {
                if (worker.state === "installed" && navigator.serviceWorker.controller) {
                  worker.postMessage({ type: "SKIP_WAITING" });
                }
              });
            });
            navigator.serviceWorker.addEventListener("controllerchange", () => {
              if (reloaded) return;
              reloaded = true;
              window.location.reload();
            });
            registration.update().catch(() => {});
          }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
