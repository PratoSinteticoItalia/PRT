<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f4d32" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="PSI Ops" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <title>Garden Planner</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #fafaf6;
      }

      body {
        min-height: 100vh;
      }

      @media print {
        html, body {
          background: #ffffff;
        }

        body {
          print-color-adjust: exact;
          -webkit-print-color-adjust: exact;
        }

        body.garden-print-report #app * {
          visibility: hidden !important;
        }

        body.garden-print-report #garden-planner-print-content,
        body.garden-print-report #garden-planner-print-content * {
          visibility: visible !important;
        }

        body.garden-print-report #garden-planner-print-content {
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          padding: 10mm !important;
          margin: 0 !important;
          background: #fff !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <noscript>Abilita JavaScript per usare il Garden Planner.</noscript>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react" src="./garden-planner-page.js?v=20260422-garden-v33-region-pricing"></script>
    <script>
      if ("serviceWorker" in navigator) {
        let reloaded = false;
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js?v=20260422-garden-v33-region-pricing").then((registration) => {
            if (registration.waiting) {
              registration.waiting.postMessage({ type: "SKIP_WAITING" });
            }
            registration.addEventListener("updatefound", () => {
              const worker = registration.installing;
              if (!worker) return;
              worker.addEventListener("statechange", () => {
                if (worker.state === "installed" && navigator.serviceWorker.controller) {
                  worker.postMessage({ type: "SKIP_WAITING" });
                }
              });
            });
            navigator.serviceWorker.addEventListener("controllerchange", () => {
              if (reloaded) return;
              reloaded = true;
              window.location.reload();
            });
            registration.update().catch(() => {});
          }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
