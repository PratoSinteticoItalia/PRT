<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Il tuo prato — Prato Sintetico Italia</title>
    <link rel="icon" href="/logo-prato.png" />
    <meta name="robots" content="noindex,nofollow" />
    <style>
      :root {
        --brand:        #2d6a4f;
        --brand-dark:   #1b4332;
        --brand-mid:    #40916c;
        --brand-soft:   #d8f3dc;
        --brand-xsoft:  #f0faf3;
        --amber:        #d97706;
        --amber-soft:   #fef3c7;
        --blue:         #2563eb;
        --blue-soft:    #eff6ff;
        --text:         #111827;
        --text2:        #374151;
        --muted:        #6b7280;
        --line:         #e5e7eb;
        --bg:           #f9fafb;
        --card:         #ffffff;
        --radius-lg:    16px;
        --radius-md:    10px;
        --shadow-sm:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
        --shadow-md:    0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        min-height: 100dvh;
      }

      /* ── TOP BAR ─────────────────────────────────────────────────────── */
      .top-bar {
        background: var(--brand-dark);
        padding: 0 24px;
        height: 56px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .top-bar-logo {
        width: 32px; height: 32px; border-radius: 8px;
        background: rgba(255,255,255,.15);
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-weight: 800; font-size: 13px; letter-spacing: -.03em;
        flex-shrink: 0;
      }
      .top-bar-name {
        font-size: 14px; font-weight: 600; color: rgba(255,255,255,.9);
        letter-spacing: -.01em;
      }

      /* ── HERO BANNER ─────────────────────────────────────────────────── */
      .hero-banner {
        background: linear-gradient(160deg, var(--brand-dark) 0%, var(--brand) 100%);
        padding: 40px 24px 80px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .hero-banner::after {
        content: "";
        position: absolute; bottom: -1px; left: 0; right: 0; height: 48px;
        background: var(--bg);
        clip-path: ellipse(55% 100% at 50% 100%);
      }
      .hero-order-ref {
        display: inline-block;
        font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
        color: rgba(255,255,255,.65);
        margin-bottom: 12px;
      }
      .hero-title {
        font-size: clamp(26px, 6vw, 38px);
        font-weight: 800;
        letter-spacing: -.025em;
        line-height: 1.15;
        color: #fff;
        margin-bottom: 10px;
      }
      .hero-sub {
        font-size: 15px; color: rgba(255,255,255,.75);
        max-width: 360px; margin: 0 auto 20px;
      }
      .hero-badge {
        display: inline-flex; align-items: center; gap: 7px;
        background: rgba(255,255,255,.15); backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,.2);
        border-radius: 100px;
        padding: 7px 14px;
        font-size: 13px; font-weight: 600; color: #fff;
      }
      .hero-badge .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #6ee7b7;
        animation: pulse-dot 2s ease-in-out infinite;
        flex-shrink: 0;
      }
      .hero-badge.done .dot { background: #6ee7b7; animation: none; }
      .hero-badge.transit .dot { background: #fcd34d; }
      @keyframes pulse-dot {
        0%,100% { box-shadow: 0 0 0 0 rgba(110,231,183,.6); }
        50%      { box-shadow: 0 0 0 5px rgba(110,231,183,0); }
      }

      /* ── MAIN LAYOUT ─────────────────────────────────────────────────── */
      .page-body {
        max-width: 680px;
        margin: 0 auto;
        padding: 0 16px 100px;
        position: relative;
        top: -32px;
      }

      /* ── CARD BASE ───────────────────────────────────────────────────── */
      .card {
        background: var(--card);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        border: 1px solid var(--line);
        overflow: hidden;
      }
      .card + .card { margin-top: 16px; }
      .card-head {
        padding: 18px 20px 14px;
        border-bottom: 1px solid var(--line);
        display: flex; align-items: center; gap: 10px;
      }
      .card-head-icon {
        width: 34px; height: 34px; border-radius: 9px;
        display: flex; align-items: center; justify-content: center;
        font-size: 17px; flex-shrink: 0;
      }
      .card-head-icon.green { background: var(--brand-soft); }
      .card-head-icon.amber { background: var(--amber-soft); }
      .card-head-icon.blue  { background: var(--blue-soft); }
      .card-head-title {
        font-size: 13px; font-weight: 700; text-transform: uppercase;
        letter-spacing: .06em; color: var(--muted);
      }

      /* ── STEPPER ─────────────────────────────────────────────────────── */
      .stepper { padding: 6px 0; }
      .step-row {
        display: grid;
        grid-template-columns: 48px 1fr;
        min-height: 64px;
        position: relative;
      }
      /* vertical connector line */
      .step-row:not(:last-child) .step-left::after {
        content: "";
        position: absolute;
        left: 23px; top: 42px; bottom: -2px;
        width: 2px;
        background: var(--line);
        z-index: 0;
      }
      .step-row.done:not(:last-child) .step-left::after { background: var(--brand-soft); }

      .step-left {
        display: flex; flex-direction: column; align-items: center;
        padding-top: 16px;
        position: relative;
      }
      .step-icon {
        width: 30px; height: 30px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 14px; z-index: 1; flex-shrink: 0;
        border: 2px solid var(--line);
        background: var(--card);
        color: var(--muted);
        transition: all .2s;
      }
      .step-row.done   .step-icon { background: var(--brand); border-color: var(--brand); color: #fff; }
      .step-row.active .step-icon {
        background: #fff; border-color: var(--brand);
        box-shadow: 0 0 0 4px var(--brand-soft);
        animation: pulse-ring 2s ease-in-out infinite;
      }
      @keyframes pulse-ring {
        0%,100% { box-shadow: 0 0 0 0 rgba(45,106,79,.3); }
        50%      { box-shadow: 0 0 0 6px rgba(45,106,79,0); }
      }

      .step-right {
        padding: 14px 20px 14px 4px;
      }
      .step-label {
        font-size: 14px; font-weight: 600; color: var(--text);
        line-height: 1.3;
      }
      .step-row.upcoming .step-label { color: var(--muted); font-weight: 500; }
      .step-sub {
        font-size: 12px; color: var(--muted); margin-top: 2px;
      }
      .step-time {
        display: inline-block;
        margin-top: 4px;
        font-size: 11px; font-weight: 600; color: var(--brand);
        background: var(--brand-xsoft); border-radius: 4px; padding: 1px 6px;
      }

      /* ── PROGRESS BAR ────────────────────────────────────────────────── */
      .progress-wrap {
        padding: 20px 20px 4px;
      }
      .progress-bar-track {
        height: 6px; border-radius: 100px; background: var(--line);
        overflow: hidden; margin-bottom: 8px;
      }
      .progress-bar-fill {
        height: 100%; border-radius: 100px;
        background: linear-gradient(90deg, var(--brand-mid), var(--brand));
        transition: width .8s cubic-bezier(.4,0,.2,1);
      }
      .progress-pct {
        font-size: 12px; font-weight: 600; color: var(--brand);
        text-align: right;
      }

      /* ── INFO GRID ───────────────────────────────────────────────────── */
      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: var(--line);
      }
      .info-cell {
        background: var(--card);
        padding: 16px 20px;
      }
      .info-cell.full { grid-column: span 2; }
      .info-label {
        font-size: 11px; text-transform: uppercase; letter-spacing: .07em;
        font-weight: 700; color: var(--muted); margin-bottom: 5px;
      }
      .info-value {
        font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.25;
      }
      .info-value small {
        display: block; font-size: 12px; font-weight: 500;
        color: var(--muted); margin-top: 2px;
      }

      /* ── CREW CARD ───────────────────────────────────────────────────── */
      .crew-row {
        display: flex; align-items: center; gap: 14px;
        padding: 16px 20px;
      }
      .crew-avatar {
        width: 48px; height: 48px; border-radius: 50%;
        background: linear-gradient(135deg, var(--brand-mid), var(--brand-dark));
        color: #fff; display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 18px; letter-spacing: -.02em;
        flex-shrink: 0;
      }
      .crew-info strong { font-size: 15px; font-weight: 700; display: block; }
      .crew-info span   { font-size: 13px; color: var(--muted); display: block; margin-top: 2px; }

      /* ── EVENTS ──────────────────────────────────────────────────────── */
      .event-row {
        display: flex; align-items: flex-start; gap: 12px;
        padding: 14px 20px;
      }
      .event-row + .event-row { border-top: 1px solid var(--line); }
      .event-emoji { font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
      .event-body { flex: 1; min-width: 0; }
      .event-body strong { font-size: 14px; font-weight: 600; display: block; }
      .event-body span   { font-size: 12px; color: var(--muted); display: block; margin-top: 2px; }
      .event-time { font-size: 12px; color: var(--muted); white-space: nowrap; margin-top: 2px; }

      /* ── WARRANTY ────────────────────────────────────────────────────── */
      .warranty-row {
        display: flex; align-items: flex-start; gap: 14px;
        padding: 18px 20px;
        background: linear-gradient(135deg, var(--blue-soft), var(--card));
      }
      .warranty-icon {
        font-size: 28px; line-height: 1; flex-shrink: 0;
      }
      .warranty-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
      .warranty-desc  { font-size: 13px; color: var(--text2); line-height: 1.5; }
      .warranty-badge {
        display: inline-block; margin-top: 8px;
        background: var(--blue); color: #fff;
        font-size: 11px; font-weight: 700; letter-spacing: .04em;
        text-transform: uppercase; padding: 3px 8px; border-radius: 5px;
      }

      /* ── DOC ROW ─────────────────────────────────────────────────────── */
      .doc-row {
        display: flex; align-items: center; gap: 12px;
        padding: 14px 20px;
      }
      .doc-row + .doc-row { border-top: 1px solid var(--line); }
      .doc-icon-wrap {
        width: 40px; height: 40px; border-radius: 9px;
        background: var(--brand-xsoft); border: 1px solid var(--brand-soft);
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; flex-shrink: 0;
      }
      .doc-info { flex: 1; min-width: 0; }
      .doc-info strong { font-size: 14px; font-weight: 600; display: block; }
      .doc-info span   { font-size: 12px; color: var(--muted); display: block; margin-top: 2px; }
      .doc-link {
        font-size: 13px; font-weight: 600; color: var(--brand);
        text-decoration: none; white-space: nowrap; padding: 6px 12px;
        background: var(--brand-xsoft); border-radius: 8px;
        border: 1px solid var(--brand-soft);
        transition: background .15s;
      }
      .doc-link:hover { background: var(--brand-soft); }

      /* ── BOTTOM CTA ──────────────────────────────────────────────────── */
      .bottom-bar {
        position: fixed; bottom: 0; left: 0; right: 0;
        background: rgba(255,255,255,.92); backdrop-filter: blur(16px);
        border-top: 1px solid var(--line);
        padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
        z-index: 100;
        box-shadow: 0 -4px 24px rgba(0,0,0,.07);
      }
      .bottom-bar-inner {
        max-width: 680px; margin: 0 auto;
        display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      }
      .cta-btn {
        padding: 14px 16px; border-radius: 12px; border: 0;
        font-size: 14px; font-weight: 600; cursor: pointer;
        text-decoration: none; text-align: center;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        letter-spacing: -.01em;
        transition: opacity .15s, transform .1s;
      }
      .cta-btn:active { transform: scale(.97); }
      .cta-btn.primary   { background: var(--brand); color: #fff; }
      .cta-btn.whatsapp  { background: #25D366; color: #fff; }
      .cta-btn.secondary {
        background: var(--card); color: var(--text);
        border: 1px solid var(--line);
      }
      .cta-btn.hidden { display: none; }

      /* ── LOADING / ERROR ─────────────────────────────────────────────── */
      .state-screen {
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; min-height: 60vh;
        text-align: center; padding: 40px 24px; color: var(--muted);
      }
      .state-screen .state-icon { font-size: 48px; margin-bottom: 16px; }
      .state-screen h1 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
      .state-screen p  { font-size: 14px; line-height: 1.6; max-width: 320px; }
      .spinner {
        width: 36px; height: 36px; border-radius: 50%;
        border: 3px solid var(--brand-soft);
        border-top-color: var(--brand);
        animation: spin .7s linear infinite;
        margin-bottom: 16px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── RESPONSIVE ──────────────────────────────────────────────────── */
      @media (max-width: 480px) {
        .hero-banner { padding: 32px 20px 72px; }
        .page-body { padding: 0 12px 100px; }
        .info-grid { grid-template-columns: 1fr; }
        .info-cell.full { grid-column: span 1; }
      }
    </style>
  </head>
  <body>

    <!-- Top bar -->
    <div class="top-bar">
      <div class="top-bar-logo">PSI</div>
      <span class="top-bar-name">Prato Sintetico Italia</span>
    </div>

    <!-- Hero: populated by JS -->
    <div id="hero" class="hero-banner" style="display:none"></div>

    <!-- Loading state (shown initially) -->
    <div id="loading" class="state-screen">
      <div class="spinner"></div>
      <p>Caricamento del tuo ordine…</p>
    </div>

    <!-- Page body: populated by JS -->
    <div id="page-body" class="page-body" style="display:none"></div>

    <script>
      /* ── LABEL MAPS ──────────────────────────────────────────────────── */
      const STAGE_LABELS = {
        preparing:   { title: "Ordine in preparazione",        sub: "Stiamo selezionando i materiali dal capannone.",        pulse: "📦 Preparazione materiali",  pct: 10 },
        scheduled:   { title: "Installazione programmata",     sub: "Ti aggiorneremo quando la squadra sarà in viaggio.",    pulse: "📅 Data posa confermata",     pct: 25 },
        in_transit:  { title: "La squadra è in viaggio 🚛",    sub: "Stanno raggiungendo il tuo cantiere.",                  pulse: "🚛 In viaggio",               pct: 50 },
        on_site:     { title: "Squadra arrivata in cantiere",  sub: "Stanno preparando l'area per la posa.",                 pulse: "📍 In cantiere",              pct: 65 },
        in_progress: { title: "Stiamo posando il tuo prato",   sub: "Lavori in corso — ci vediamo tra poco!",               pulse: "🔨 Posa in corso",            pct: 80 },
        completed:   { title: "Il tuo prato è pronto 🌿",      sub: "Lavori completati e firmati. Goditi il tuo giardino!", pulse: "✓ Lavori completati",         pct: 100 },
      };

      const EVENT_LABELS = {
        departure:  { icon: "🚛", title: "Squadra in viaggio",   sub: "Partiti dal capannone" },
        arrival:    { icon: "📍", title: "Arrivati in cantiere", sub: "Inizio attività sul posto" },
        work_start: { icon: "🔨", title: "Inizio posa",          sub: "Lavori operativi avviati" },
        work_end:   { icon: "✅", title: "Posa terminata",       sub: "Verifica finale con il cliente" },
        return:     { icon: "🏁", title: "Cantiere chiuso",      sub: "Squadra rientrata" },
        issue:      { icon: "⚠️", title: "Segnalazione",         sub: "Comunicazione dal cantiere" },
        note:       { icon: "📝", title: "Nota operativa",       sub: "Aggiornamento cantiere" },
      };

      const STEPS = [
        { key: "ordered",     title: "Ordine ricevuto",      sub: "Pagamento confermato",          icon: "✓" },
        { key: "preparing",   title: "Materiali preparati",  sub: "Rotoli selezionati dal capannone", icon: "📦" },
        { key: "in_transit",  title: "Squadra in viaggio",   sub: "Verso il cantiere",             icon: "🚛" },
        { key: "on_site",     title: "Arrivati in cantiere", sub: "Verifica preparativa",          icon: "📍" },
        { key: "in_progress", title: "Posa in corso",        sub: "Lavori operativi",              icon: "🔨" },
        { key: "completed",   title: "Verbale firmato",       sub: "Garanzia 12 mesi attiva",      icon: "🌿" },
      ];
      const STAGE_ORDER = ["ordered","preparing","scheduled","in_transit","on_site","in_progress","completed"];

      /* ── UTILS ───────────────────────────────────────────────────────── */
      const esc = (v) => String(v ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
      const fmtDate = (iso) => {
        if (!iso) return "—";
        try { return new Intl.DateTimeFormat("it-IT",{day:"numeric",month:"long",year:"numeric"}).format(new Date(iso)); }
        catch { return String(iso); }
      };
      const fmtTime = (iso) => {
        if (!iso) return "";
        try { return new Intl.DateTimeFormat("it-IT",{hour:"2-digit",minute:"2-digit"}).format(new Date(iso)); }
        catch { return ""; }
      };
      const initials = (name) => String(name||"").trim().split(/\s+/).slice(0,2).map(p=>p[0]?.toUpperCase()||"").join("") || "T";

      /* ── MAIN ────────────────────────────────────────────────────────── */
      async function loadTracking() {
        const m = window.location.pathname.match(/^\/track\/([A-Za-z0-9_\-]+)/);
        const token = m && m[1];
        if (!token) return showError("link_invalid");

        try {
          const res = await fetch(`/api/public/track/${encodeURIComponent(token)}`);
          if (res.status === 404) return showError("not_found");
          if (!res.ok) throw new Error("fetch_failed");
          render(await res.json());
        } catch {
          showError("load_failed");
        }
      }

      function showError(type) {
        document.getElementById("loading").style.display = "none";
        const msgs = {
          link_invalid: { icon: "🔗", title: "Link non valido",    body: "Il link che hai aperto non è corretto. Contatta Prato Sintetico Italia." },
          not_found:    { icon: "🔍", title: "Link non trovato",   body: "Questo link di tracking non è più attivo. Contatta il nostro supporto." },
          load_failed:  { icon: "📡", title: "Errore di caricamento", body: "Ricarica la pagina o riprova tra qualche minuto." },
        };
        const m = msgs[type] || msgs.load_failed;
        document.getElementById("hero").style.display = "";
        document.getElementById("hero").innerHTML = `
          <div class="state-screen" style="color:#fff;min-height:unset;padding:20px 24px 40px">
            <div class="state-icon">${m.icon}</div>
            <h1 style="color:#fff">${m.title}</h1>
            <p style="color:rgba(255,255,255,.75)">${m.body}</p>
          </div>`;
      }

      function render(data) {
        document.getElementById("loading").style.display = "none";

        const stage = data.stage || "preparing";
        const info  = STAGE_LABELS[stage] || STAGE_LABELS.preparing;
        const stageIdx = STAGE_ORDER.indexOf(stage);

        /* ── HERO ── */
        const badgeClass = stage === "completed" ? "done" : stage === "in_transit" ? "transit" : "";
        document.getElementById("hero").innerHTML = `
          <div class="hero-order-ref">Ordine ${esc(data.orderNumber)} · ${esc(data.customerName)}</div>
          <h1 class="hero-title">${esc(info.title)}</h1>
          <p class="hero-sub">${esc(info.sub)}</p>
          <div class="hero-badge ${badgeClass}">
            <span class="dot"></span>${esc(info.pulse)}
          </div>`;
        document.getElementById("hero").style.display = "";

        /* ── BODY ── */
        const parts = [];

        /* Progress bar card */
        const pct = info.pct || 0;
        parts.push(`
          <div class="card">
            <div class="progress-wrap">
              <div class="progress-bar-track">
                <div class="progress-bar-fill" style="width:${pct}%"></div>
              </div>
              <div class="progress-pct">${pct}% completato</div>
            </div>
            <div class="stepper">${renderStepper(stage, stageIdx, data)}</div>
          </div>`);

        /* Dettagli lavoro */
        const inst = data.installation || {};
        parts.push(`
          <div class="card">
            <div class="card-head">
              <div class="card-head-icon green">📋</div>
              <span class="card-head-title">Dettagli del lavoro</span>
            </div>
            <div class="info-grid">
              <div class="info-cell">
                <div class="info-label">Prodotto</div>
                <div class="info-value">${esc(data.productName)}<small>posa professionale</small></div>
              </div>
              <div class="info-cell">
                <div class="info-label">Superficie</div>
                <div class="info-value">${esc(String(data.sqm))} m²<small>area totale</small></div>
              </div>
              ${data.siteAddress ? `
              <div class="info-cell full">
                <div class="info-label">Indirizzo cantiere</div>
                <div class="info-value" style="font-size:14px;text-transform:capitalize">${esc(data.siteAddress)}</div>
              </div>` : ""}
              ${inst.installDate ? `
              <div class="info-cell">
                <div class="info-label">Data posa</div>
                <div class="info-value" style="font-size:15px">${esc(fmtDate(inst.installDate))}${inst.installTime ? `<small>Ore ${esc(inst.installTime)}</small>` : ""}</div>
              </div>` : ""}
              ${inst.crew ? `
              <div class="info-cell">
                <div class="info-label">Squadra</div>
                <div class="info-value" style="font-size:15px">Team ${esc(inst.crew)}</div>
              </div>` : ""}
            </div>
          </div>`);

        /* Cronologia eventi cantiere */
        if (data.events && data.events.length) {
          const evRows = data.events.map(ev => {
            const info = EVENT_LABELS[ev.eventType] || { icon: "•", title: ev.eventType, sub: "" };
            const extras = [
              ev.hasGps ? "📍 GPS verificato" : "",
              ev.photosCount > 0 ? `📷 ${ev.photosCount} foto` : ""
            ].filter(Boolean).join(" · ");
            return `
              <div class="event-row">
                <span class="event-emoji">${info.icon}</span>
                <div class="event-body">
                  <strong>${esc(info.title)}</strong>
                  <span>${esc(info.sub)}${extras ? ` · ${extras}` : ""}</span>
                </div>
                <div class="event-time">${esc(fmtTime(ev.occurredAt))}</div>
              </div>`;
          }).join("");
          parts.push(`
            <div class="card">
              <div class="card-head">
                <div class="card-head-icon amber">🗓</div>
                <span class="card-head-title">Cronologia cantiere</span>
              </div>
              ${evRows}
            </div>`);
        }

        /* Documenti */
        if (data.reports && data.reports.length) {
          const docRows = data.reports.map(r => `
            <div class="doc-row">
              <div class="doc-icon-wrap">📄</div>
              <div class="doc-info">
                <strong>Verbale di consegna</strong>
                <span>Firmato ${esc(fmtDate(r.signedAt))}${r.executedSqm ? ` · ${esc(String(r.executedSqm))} m²` : ""}</span>
              </div>
              ${r.pdfUrl ? `<a href="${esc(r.pdfUrl)}" class="doc-link" target="_blank" rel="noopener">Scarica PDF →</a>` : ""}
            </div>`).join("");
          parts.push(`
            <div class="card">
              <div class="card-head">
                <div class="card-head-icon green">📁</div>
                <span class="card-head-title">Documenti</span>
              </div>
              ${docRows}
            </div>`);
        }

        /* Garanzia */
        if (data.warrantyUntil) {
          parts.push(`
            <div class="card">
              <div class="warranty-row">
                <div class="warranty-icon">🛡️</div>
                <div>
                  <div class="warranty-title">Garanzia 12 mesi attiva</div>
                  <div class="warranty-desc">Hai diritto a un intervento gratuito entro 12 mesi dalla posa per qualsiasi difetto di installazione.</div>
                  <span class="warranty-badge">Scade ${esc(fmtDate(data.warrantyUntil))}</span>
                </div>
              </div>
            </div>`);
        }

        const body = document.getElementById("page-body");
        body.innerHTML = parts.join("");
        body.style.display = "";

        /* Bottom CTA */
        if (data.contactWhatsapp || data.contactPhone) {
          const bar = document.createElement("div");
          bar.className = "bottom-bar";
          bar.innerHTML = `
            <div class="bottom-bar-inner">
              <a href="${data.contactWhatsapp ? `https://wa.me/${data.contactWhatsapp.replace(/[^0-9]/g,"")}` : "#"}"
                 class="cta-btn whatsapp ${data.contactWhatsapp ? "" : "hidden"}">
                💬 Scrivi su WhatsApp
              </a>
              <a href="${data.contactPhone ? `tel:${data.contactPhone}` : "#"}"
                 class="cta-btn primary ${data.contactPhone ? "" : "hidden"}">
                📞 Chiama
              </a>
            </div>`;
          document.body.appendChild(bar);
        }
      }

      function renderStepper(stage, stageIdx, data) {
        return STEPS.map(step => {
          const si = STAGE_ORDER.indexOf(step.key);
          const isDone   = si < stageIdx;
          const isActive = si === stageIdx || (step.key === "ordered"); // ordered always done
          const cls = (step.key === "ordered" || isDone) ? "done"
                    : isActive ? "active"
                    : "upcoming";
          const iconHtml = (step.key === "ordered" || isDone)
            ? `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L12 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
            : cls === "active" ? `<span style="width:8px;height:8px;border-radius:50%;background:var(--brand);display:block"></span>`
            : `<span style="width:6px;height:6px;border-radius:50%;background:var(--line);display:block"></span>`;

          /* time badge for events */
          let timeBadge = "";
          if (data.events) {
            const ev = data.events.find(e => {
              if (step.key === "in_transit"  && e.eventType === "departure") return true;
              if (step.key === "on_site"     && e.eventType === "arrival")   return true;
              if (step.key === "in_progress" && e.eventType === "work_start") return true;
              if (step.key === "completed"   && e.eventType === "return")     return true;
              return false;
            });
            if (ev) timeBadge = `<span class="step-time">${fmtTime(ev.occurredAt)}</span>`;
          }
          if (step.key === "ordered" && data.installation?.installDate && step.key === "ordered") {
            // no time for ordered
          }

          return `
            <div class="step-row ${cls}">
              <div class="step-left">
                <div class="step-icon">${iconHtml}</div>
              </div>
              <div class="step-right">
                <div class="step-label">${esc(step.title)}</div>
                <div class="step-sub">${esc(step.sub)}</div>
                ${timeBadge}
              </div>
            </div>`;
        }).join("");
      }

      /* ── BOOT ─── */
      loadTracking();
      setInterval(loadTracking, 60000);
    </script>
  </body>
</html>
